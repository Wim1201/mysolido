<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - MySolido Bridge</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a6b3c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
      (function(){ var t=localStorage.getItem('mysolido-theme'); if(t) document.documentElement.dataset.theme=t; })();
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--color-bg);
            margin: 0;
        }
        .login-container {
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 4px;
        }
        .login-subtitle {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
        }
        .login-form input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 16px;
            background: var(--color-bg);
            color: var(--color-text);
            box-sizing: border-box;
        }
        .login-form input[type="password"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(15, 155, 79, 0.15);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-btn:hover {
            background: #0d8a43;
        }
        .login-error {
            background: #fdecea;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .login-footer {
            margin-top: 24px;
            font-size: 0.75rem;
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="#0f9b4f" stroke="#0d8a43" stroke-width="0.5"/>
            </svg>
        </div>
        <div class="login-title">MySolido Bridge</div>
        <div class="login-subtitle">Voer je wachtwoord in om je kluis te openen</div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="login-error">{{ message }}</div>
            {% endfor %}
        {% endwith %}

        <form method="POST" class="login-form">
            <input type="password" name="password" placeholder="Wachtwoord" autofocus required>
            <button type="submit" class="login-btn">Openen</button>
        </form>

        <div class="login-footer">
            &#128274; Beveiligde verbinding
        </div>
    </div>
</body>
</html>
