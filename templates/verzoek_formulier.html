{% extends "base.html" %}

{% block title %}{{ t.req_form_title }} - MySolido{% endblock %}

{% block content %}
    <style>
    .verzoek-intro {
        background: var(--color-surface);
        border-radius: var(--radius-md);
        padding: 20px;
        box-shadow: var(--shadow-card);
        margin-bottom: 20px;
    }
    .verzoek-intro h2 { font-size: 1.15rem; margin-bottom: 8px; }
    .verzoek-intro p { font-size: 0.9rem; color: var(--color-text-muted); margin: 0; }
    .data-check-group {
        background: var(--color-bg-hover);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 6px;
    }
    .data-check-group label {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        font-size: 0.9rem;
    }
    .data-check-group input[type="checkbox"] { flex-shrink: 0; }
    .agree-group {
        background: var(--color-bg-hover);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 14px;
        margin-top: 16px;
    }
    .agree-group label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 0.9rem; }
    .agree-group input[type="checkbox"] { margin-top: 3px; flex-shrink: 0; }
    </style>

    <div class="verzoek-intro">
        <h2>{{ t.req_form_title }}</h2>
        <p>{{ t.req_form_desc }}</p>
    </div>

    <form action="{{ url_for('verzoek_submit') }}" method="post">
        <div class="card" style="margin-bottom: 20px;">
            <h3>{{ t.req_your_details }}</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; margin-top: 12px;">
                <div style="display: flex; flex-direction: column;">
                    <label for="name" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 4px;">{{ t.req_your_name }} <span style="color: var(--color-danger);">*</span></label>
                    <input type="text" name="name" id="name" class="form-input" required placeholder="{{ t.req_your_name_placeholder }}">
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label for="organization" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 4px;">{{ t.req_your_org }}</label>
                    <input type="text" name="organization" id="organization" class="form-input" placeholder="{{ t.req_your_org_placeholder }}">
                </div>
            </div>
            <div style="display: flex; flex-direction: column; margin-top: 12px;">
                <label for="email" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 4px;">{{ t.req_your_email }} <span style="color: var(--color-danger);">*</span></label>
                <input type="email" name="email" id="email" class="form-input" required placeholder="{{ t.req_your_email_placeholder }}">
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <h3>{{ t.req_your_request }}</h3>
            <div style="display: flex; flex-direction: column; margin-top: 12px;">
                <label for="category" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 4px;">{{ t.req_category }}</label>
                <select name="category" id="category" class="form-input">
                    {% for key, cat in categories.items() %}
                    <option value="{{ key }}">{{ cat.label }} &mdash; {{ cat.description }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-top: 16px;">
                <label style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 8px; display: block;">
                    {{ t.req_which_data_request }} <span style="color: var(--color-danger);">*</span>
                </label>
                <div class="data-check-group">
                    <label><input type="checkbox" name="requested_data" value="housing"> {{ t.req_data_housing }}</label>
                </div>
                <div class="data-check-group">
                    <label><input type="checkbox" name="requested_data" value="household"> {{ t.req_data_household }}</label>
                </div>
                <div class="data-check-group">
                    <label><input type="checkbox" name="requested_data" value="vehicle"> {{ t.req_data_vehicle }}</label>
                </div>
                <div class="data-check-group">
                    <label><input type="checkbox" name="requested_data" value="insurance"> {{ t.req_data_insurance }}</label>
                </div>
                <div class="data-check-group">
                    <label><input type="checkbox" name="requested_data" value="occupation"> {{ t.req_data_occupation }}</label>
                </div>
                <div class="data-check-group">
                    <label><input type="checkbox" name="requested_data" value="health"> {{ t.req_data_health }}</label>
                </div>
            </div>

            <div style="display: flex; flex-direction: column; margin-top: 16px;">
                <label for="purpose" style="font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); margin-bottom: 4px;">
                    {{ t.req_purpose_label }} <span style="color: var(--color-danger);">*</span>
                </label>
                <textarea name="purpose" id="purpose" class="form-input" rows="4" required
                          placeholder="{{ t.req_purpose_placeholder }}"
                          style="resize: vertical; font-family: inherit;"></textarea>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div class="agree-group">
                <label>
                    <input type="checkbox" name="agreed_terms" value="yes" required>
                    <span>{{ t.req_agree_terms }}</span>
                </label>
            </div>
        </div>

        <div style="text-align: center; margin: 24px 0;">
            <button type="submit" class="btn btn-primary" style="padding: 10px 40px; font-size: 1rem;">{{ t.req_submit }}</button>
            <p style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 8px;">
                {{ t.req_submit_note }}
            </p>
        </div>
    </form>
{% endblock %}
