{% extends "base.html" %}
{% from "macros/icons.html" import icon_arrow_left %}

{% block title %}{{ t.consent_form_title }} - MySolido{% endblock %}

{% block content %}
    <div class="breadcrumbs">
        <a href="{{ url_for('consent_list') }}" class="btn-back">{{ icon_arrow_left() }} {{ t.back }}</a>
        <span class="current">{{ t.consent_new }}</span>
    </div>

    <div class="consent-form-card">
        <h2>&#x2705; {{ t.consent_form_title }}</h2>

        <form action="{{ url_for('consent_new') }}" method="post" class="consent-form">
            <label for="title">{{ t.consent_form_name }} <span class="required">*</span></label>
            <input type="text" name="title" id="title" placeholder="{{ t.consent_form_name_placeholder }}" required>

            <label for="description">{{ t.consent_form_description }}</label>
            <textarea name="description" id="description" rows="3" placeholder="{{ t.consent_form_description_placeholder }}"></textarea>

            <label for="receiver">{{ t.consent_form_receiver }} <span class="required">*</span></label>
            <input type="text" name="receiver" id="receiver" placeholder="{{ t.consent_form_receiver_placeholder }}" required>

            <label for="purpose">{{ t.consent_form_purpose }} <span class="required">*</span></label>
            <select name="purpose" id="purpose">
                {% for key, val in purposes.items() %}
                <option value="{{ key }}">{{ val.label }}</option>
                {% endfor %}
            </select>

            <label for="category">{{ t.consent_form_category }} <span class="required">*</span></label>
            <select name="category" id="category">
                {% for key, val in categories.items() %}
                <option value="{{ key }}">{{ val.label }}</option>
                {% endfor %}
            </select>

            <label for="expires">{{ t.consent_form_expires }}</label>
            <input type="date" name="expires" id="expires">

            <label for="note">{{ t.consent_form_note }}</label>
            <textarea name="note" id="note" rows="2" placeholder="{{ t.consent_form_note_placeholder }}"></textarea>

            <div class="consent-form-actions">
                <a href="{{ url_for('consent_list') }}" class="btn btn-secondary">{{ t.cancel }}</a>
                <button type="submit" class="btn">{{ t.consent_form_submit }}</button>
            </div>
        </form>
    </div>
{% endblock %}
