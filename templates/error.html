{% extends "base.html" %}

{% block title %}{{ t.error_title }} - MySolido{% endblock %}

{% block content %}
    <div class="settings-card" style="text-align: center; padding: 3rem 2rem;">
        <h2>&#x26a0;&#xfe0f; {{ t.error_heading }}</h2>
        <p style="margin: 1rem 0; color: var(--text-secondary);">{{ error }}</p>
        <a href="{{ url_for('index') }}" class="btn" style="margin-top: 1rem;">{{ t.error_back }}</a>
    </div>
{% endblock %}
