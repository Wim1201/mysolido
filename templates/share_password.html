<!DOCTYPE html>
<html lang="nl" data-theme="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord vereist - MySolido</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231a6b3c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7f5;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 48px 40px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        .logo svg { width: 32px; height: 32px; stroke: #1a6b3c; }
        .logo span { font-size: 1.3rem; font-weight: 700; color: #1a6b3c; }
        .icon-lock {
            width: 48px;
            height: 48px;
            stroke: #1a6b3c;
            margin-bottom: 16px;
        }
        h2 { font-size: 1.2rem; margin-bottom: 8px; }
        p { color: #555; font-size: 0.95rem; margin-bottom: 20px; }
        .flash {
            padding: 10px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .flash.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        form { text-align: left; }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: #555;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 16px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #1a6b3c;
            box-shadow: 0 0 0 2px rgba(26,107,60,0.15);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1a6b3c, #0f9b4f);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>MySolido</span>
        </div>
        <svg class="icon-lock" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h2>Dit bestand is beschermd met een wachtwoord</h2>
        <p>Voer het wachtwoord in om het bestand te openen.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post" action="{{ url_for('view_shared_file', token=token) }}">
            <label for="password">Wachtwoord</label>
            <input type="password" id="password" name="password" required autofocus>
            <button type="submit">Openen</button>
        </form>
    </div>
</body>
</html>
